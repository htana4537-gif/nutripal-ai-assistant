
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI GYM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #F0F4F8; color: #1A202C; } 
      
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.1); border-radius: 20px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0, 0, 0, 0.2); }

      /* Animation Keyframes */
      @keyframes blob {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
        100% { transform: translate(0px, 0px) scale(1); }
      }
      .animate-blob {
        animation: blob 10s infinite;
      }
      .animation-delay-2000 {
        animation-delay: 2s;
      }
      .animation-delay-4000 {
        animation-delay: 4s;
      }

      @keyframes wave {
        0% { transform: translateX(0) translateZ(0) scaleY(1); }
        50% { transform: translateX(-25%) translateZ(0) scaleY(0.8); }
        100% { transform: translateX(-50%) translateZ(0) scaleY(1); }
      }
      .animate-wave {
        animation: wave 10s linear infinite;
      }
      
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 20px rgba(78, 205, 196, 0.2); }
        50% { box-shadow: 0 0 40px rgba(78, 205, 196, 0.4); }
      }
      .animate-pulse-glow {
        animation: pulse-glow 3s infinite;
      }

      /* Liquid Morph Transition */
      @keyframes liquid-enter {
        0% { 
            opacity: 0; 
            transform: scale(0.96) translateY(8px); 
            filter: blur(8px);
        }
        60% {
            opacity: 1;
            filter: blur(0px);
        }
        100% { 
            opacity: 1; 
            transform: scale(1) translateY(0); 
            filter: blur(0);
        }
      }
      .animate-liquid-enter {
        animation: liquid-enter 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      
      /* Glass Utility Classes - Updated for clearer glass effect (20% Blur) */
      .glass-panel {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(4px) saturate(120%);
        -webkit-backdrop-filter: blur(4px) saturate(120%);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      }
      
      .glass-button {
        background: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(4px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        transition: all 0.3s ease;
        color: #1A202C;
      }
      .glass-button:hover {
        background: rgba(255, 255, 255, 0.8);
        border-color: #fff;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }
    </style>
  <script type="importmap">

</head>

</html>
